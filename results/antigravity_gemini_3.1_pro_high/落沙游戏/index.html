<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Sand Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="simulation-container">
        <canvas id="simCanvas"></canvas>
    </div>

    <div class="control-panel">
        <h1 class="logo">SandSim</h1>

        <div class="panel-section">
            <h3>Materials</h3>
            <div class="material-grid" id="materialGrid">
                <!-- Material buttons generated by JS -->
            </div>
        </div>

        <div class="panel-section">
            <h3>Brush Size: <span id="brushSizeVal">3</span></h3>
            <input type="range" id="brushSize" min="1" max="15" value="3" class="slider">
        </div>

        <div class="panel-section controls">
            <button id="btnPlayPause" class="btn primary">Pause</button>
            <button id="btnClear" class="btn danger">Clear</button>
        </div>
    </div>

    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
