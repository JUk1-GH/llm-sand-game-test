<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>落沙模拟游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    overflow-y: auto;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 16px;
    max-width: 820px;
    width: 100%;
  }
  h1 {
    color: #c8c8e0;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  canvas {
    border: 2px solid #2a2a4a;
    border-radius: 8px;
    cursor: crosshair;
    background: #1a1a2e;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 600px;
  }
  .mat-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 10px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: #1a1a30;
    color: #a0a0c0;
    cursor: pointer;
    font-size: 11px;
    min-width: 54px;
    transition: all 0.15s;
  }
  .mat-btn:hover {
    background: #2a2a48;
    border-color: #4a4a7a;
  }
  .mat-btn.active {
    border-color: #8888ff;
    background: #252545;
    color: #d0d0ff;
  }
  .mat-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .settings {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .settings label {
    color: #a0a0c0;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .settings input[type=range] {
    width: 80px;
    accent-color: #8888ff;
  }
  .action-btn {
    padding: 8px 18px;
    border: 2px solid #4a4a7a;
    border-radius: 8px;
    background: #1a1a30;
    color: #c0c0e0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .action-btn:hover {
    background: #2a2a48;
    border-color: #8888ff;
  }
  .action-btn.danger {
    border-color: #7a3a3a;
    color: #e08080;
  }
  .action-btn.danger:hover {
    background: #3a1a1a;
    border-color: #ff5555;
  }
  .info {
    color: #606080;
    font-size: 11px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">
  <h1>落沙模拟</h1>
  <canvas id="canvas"></canvas>
  <div class="controls" id="materialPanel"></div>
  <div class="settings">
    <label>笔刷: <input type="range" id="brushSize" min="1" max="15" value="4"></label>
    <span id="brushLabel" style="color:#a0a0c0;font-size:12px;min-width:30px;">4px</span>
    <button class="action-btn" id="pauseBtn">暂停</button>
    <button class="action-btn danger" id="clearBtn">清除</button>
  </div>
  <div class="info">按住鼠标/触摸拖动放置粒子 | 笔刷大小可调</div>
</div>

<script>
(function() {
  // ─── 常量 ───
  const W = 400, H = 280;
  const EMPTY = 0;
  const TYPE_POWDER = 0, TYPE_LIQUID = 1, TYPE_SOLID = 2, TYPE_GAS = 3, TYPE_FIRE = 4;

  const materials = [
    { id: 0,  name: '空',   color: '#000000', type: null,         density: 0  },
    { id: 1,  name: '沙子', color: '#e8c170', type: TYPE_POWDER,  density: 7  },
    { id: 2,  name: '水',   color: '#3388dd', type: TYPE_LIQUID,  density: 5  },
    { id: 3,  name: '石头', color: '#777788', type: TYPE_SOLID,   density: 10 },
    { id: 4,  name: '木头', color: '#8b6914', type: TYPE_SOLID,   density: 10, flammable: true },
    { id: 5,  name: '火',   color: '#ff5533', type: TYPE_FIRE,    density: 3,  lifetime: 180 },
    { id: 6,  name: '油',   color: '#664400', type: TYPE_LIQUID,  density: 4,  flammable: true },
    { id: 7,  name: '熔岩', color: '#ff4400', type: TYPE_LIQUID,  density: 8  },
    { id: 8,  name: '蒸汽', color: '#ccddee', type: TYPE_GAS,     density: 1,  lifetime: 120, condensesTo: 2 },
    { id: 9,  name: '酸',   color: '#88ff22', type: TYPE_LIQUID,  density: 6  },
    { id: 10, name: '植物', color: '#33aa33', type: TYPE_SOLID,   density: 10, flammable: true },
    { id: 11, name: '烟雾', color: '#888888', type: TYPE_GAS,     density: 2,  lifetime: 200 },
    { id: 12, name: '玻璃', color: '#aaccee', type: TYPE_SOLID,   density: 9  },
  ];

  const matById = {};
  materials.forEach(m => { matById[m.id] = m; });

  // ─── 状态 ───
  const grid = new Uint8Array(W * H);
  const life = new Uint8Array(W * H);

  let selectedMat = 1;
  let brushRadius = 4;
  let paused = false;
  let frame = 0;
  let mouseDown = false;
  let mouseX = -1, mouseY = -1;

  // ─── DOM ───
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;

  const brushSlider = document.getElementById('brushSize');
  const brushLabel = document.getElementById('brushLabel');
  const pauseBtn = document.getElementById('pauseBtn');
  const clearBtn = document.getElementById('clearBtn');
  const materialPanel = document.getElementById('materialPanel');

  // ─── 材质面板 ───
  function buildMaterialPanel() {
    materialPanel.innerHTML = '';
    for (let i = 1; i < materials.length; i++) {
      const m = materials[i];
      const btn = document.createElement('button');
      btn.className = 'mat-btn' + (i === selectedMat ? ' active' : '');
      btn.innerHTML = `<div class="mat-dot" style="background:${m.color}"></div><span>${m.name}</span>`;
      btn.addEventListener('click', () => selectMaterial(i));
      btn.addEventListener('touchend', (e) => { e.preventDefault(); selectMaterial(i); });
      materialPanel.appendChild(btn);
    }
  }

  function selectMaterial(id) {
    selectedMat = id;
    const btns = materialPanel.querySelectorAll('.mat-btn');
    btns.forEach((b, i) => b.classList.toggle('active', i + 1 === id));
  }

  function updateBrushLabel() {
    brushLabel.textContent = brushRadius + 'px';
  }

  brushSlider.addEventListener('input', () => {
    brushRadius = parseInt(brushSlider.value);
    updateBrushLabel();
  });

  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '运行' : '暂停';
  });

  clearBtn.addEventListener('click', () => {
    grid.fill(0);
    life.fill(0);
  });

  // ─── 输入处理 ───
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: Math.floor((clientX - rect.left) * scaleX),
      y: Math.floor((clientY - rect.top) * scaleY)
    };
  }

  function placeBrush(cx, cy) {
    const r = brushRadius;
    const r2 = r * r;
    const minX = Math.max(0, cx - r);
    const maxX = Math.min(W - 1, cx + r);
    const minY = Math.max(0, cy - r);
    const maxY = Math.min(H - 1, cy + r);

    for (let py = minY; py <= maxY; py++) {
      for (let px = minX; px <= maxX; px++) {
        const dx = px - cx, dy = py - cy;
        if (dx * dx + dy * dy <= r2) {
          const idx = py * W + px;
          grid[idx] = selectedMat;
          const m = matById[selectedMat];
          life[idx] = (m.lifetime !== undefined) ? m.lifetime : 255;
        }
      }
    }
  }

  canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;
    placeBrush(pos.x, pos.y);
  });

  canvas.addEventListener('mousemove', (e) => {
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;
    if (mouseDown) placeBrush(pos.x, pos.y);
  });

  canvas.addEventListener('mouseup', () => { mouseDown = false; });
  canvas.addEventListener('mouseleave', () => { mouseDown = false; });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    mouseDown = true;
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;
    placeBrush(pos.x, pos.y);
  });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;
    if (mouseDown) placeBrush(pos.x, pos.y);
  });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    mouseDown = false;
  });

  // ─── 渲染 ───
  let imageData = ctx.createImageData(W, H);
  let buf = new Uint32Array(imageData.data.buffer);

  // 预计算颜色表（含hash色差）
  const colorCache = new Array(materials.length);
  for (let i = 0; i < materials.length; i++) {
    colorCache[i] = new Uint32Array(256 * 256);
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
  }

  // 简单hash
  function hash(x, y) {
    let h = (x * 374761393 + y * 668265263) ^ 0x5bf03635;
    h = ((h >> 13) ^ h) * 1274126177;
    return (h >> 16) & 0xff;
  }

  function precomputeColors() {
    for (let i = 0; i < materials.length; i++) {
      if (i === 0) continue;
      const [br, bg, bb] = hexToRgb(materials[i].color);
      const tbl = colorCache[i];
      for (let y = 0; y < 256; y++) {
        for (let x = 0; x < 256; x++) {
          const h = hash(x, y);
          const v = 0.85 + (h / 255) * 0.15;
          const r = Math.min(255, Math.floor(br * v));
          const g = Math.min(255, Math.floor(bg * v));
          const b = Math.min(255, Math.floor(bb * v));
          tbl[y * 256 + x] = (255 << 24) | (b << 16) | (g << 8) | r;
        }
      }
    }
  }
  precomputeColors();

  function render() {
    for (let i = 0; i < W * H; i++) {
      const mat = grid[i];
      if (mat === 0) {
        buf[i] = 0xFF2E1A1A;
      } else {
        const x = i % W, y = Math.floor(i / W);
        const cx = x & 0xff, cy = y & 0xff;
        buf[i] = colorCache[mat][cy * 256 + cx];
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }

  // ─── 物理引擎 ───
  function trySwap(x1, y1, x2, y2) {
    if (x2 < 0 || x2 >= W || y2 < 0 || y2 >= H) return false;
    const i1 = y1 * W + x1;
    const i2 = y2 * W + x2;
    if (grid[i2] === EMPTY) {
      grid[i2] = grid[i1];
      grid[i1] = EMPTY;
      life[i2] = life[i1];
      life[i1] = 0;
      return true;
    }
    return false;
  }

  function canDensitySwap(mat1, mat2) {
    const m1 = matById[mat1], m2 = matById[mat2];
    if (!m1 || !m2) return false;
    return m1.density > m2.density;
  }

  function tryDensitySwap(x1, y1, x2, y2) {
    if (x2 < 0 || x2 >= W || y2 < 0 || y2 >= H) return false;
    const i1 = y1 * W + x1;
    const i2 = y2 * W + x2;
    const m2 = grid[i2];
    if (m2 === EMPTY) return false;
    const m1 = grid[i1];
    if (canDensitySwap(m1, m2)) {
      grid[i2] = m1;
      grid[i1] = m2;
      const tmpLife = life[i1];
      life[i1] = life[i2];
      life[i2] = tmpLife;
      return true;
    }
    return false;
  }

  function isFlammable(mat) {
    const m = matById[mat];
    return m && m.flammable;
  }

  function updatePowder(x, y) {
    const idx = y * W + x;
    const mat = grid[idx];

    // 下
    if (trySwap(x, y, x, y + 1)) return;
    // 对角
    const dir = (hash(x, y + frame) & 1) ? 1 : -1;
    if (trySwap(x, y, x + dir, y + 1)) return;
    if (trySwap(x, y, x - dir, y + 1)) return;
  }

  function updateLiquid(x, y) {
    // 向下：先尝试空位，再尝试密度置换
    if (trySwap(x, y, x, y + 1)) return;
    if (tryDensitySwap(x, y, x, y + 1)) return;

    // 水平扩散 + 密度置换
    const rnd = hash(x + frame * 3, y) & 3;
    if (rnd === 0) {
      if (trySwap(x, y, x - 1, y)) return;
      if (tryDensitySwap(x, y, x - 1, y)) return;
      if (trySwap(x, y, x + 1, y)) return;
      if (tryDensitySwap(x, y, x + 1, y)) return;
    } else if (rnd === 1) {
      if (trySwap(x, y, x + 1, y)) return;
      if (tryDensitySwap(x, y, x + 1, y)) return;
      if (trySwap(x, y, x - 1, y)) return;
      if (tryDensitySwap(x, y, x - 1, y)) return;
    } else if (rnd === 2) {
      if (trySwap(x, y, x - 1, y)) return;
      if (tryDensitySwap(x, y, x - 1, y)) return;
      if (trySwap(x, y, x - 1, y - 1)) return;
      if (trySwap(x, y, x + 1, y)) return;
      if (tryDensitySwap(x, y, x + 1, y)) return;
    } else {
      if (trySwap(x, y, x + 1, y)) return;
      if (tryDensitySwap(x, y, x + 1, y)) return;
      if (trySwap(x, y, x + 1, y - 1)) return;
      if (trySwap(x, y, x - 1, y)) return;
      if (tryDensitySwap(x, y, x - 1, y)) return;
    }
  }

  function updateGas(x, y) {
    const idx = y * W + x;

    // 上
    if (trySwap(x, y, x, y - 1)) return;
    if (tryDensitySwap(x, y, x, y - 1)) return;

    // 水平+斜上
    const rnd = hash(x, y + frame * 7) & 3;
    const dir = (rnd & 1) ? 1 : -1;
    if (rnd < 2) {
      if (trySwap(x, y, x + dir, y)) return;
      if (trySwap(x, y, x + dir, y - 1)) return;
    } else {
      if (trySwap(x, y, x + dir, y - 1)) return;
      if (trySwap(x, y, x + dir, y)) return;
    }
  }

  function updateFire(x, y) {
    const idx = y * W + x;

    // 寿命递减
    if (life[idx] > 0 && life[idx] < 255) {
      life[idx]--;
      if (life[idx] === 0) {
        grid[idx] = EMPTY;
        return;
      }
    }

    // 上
    if (trySwap(x, y, x, y - 1)) return;
    // 随机侧移
    const dir = (hash(x * 13, y * 7 + frame) & 1) ? 1 : -1;
    if (trySwap(x, y, x + dir, y - 1)) return;
    if (trySwap(x, y, x + dir, y)) return;
    if (trySwap(x, y, x - dir, y)) return;
  }

  function checkInteractions(x, y, mat) {
    const idx = y * W + x;
    if (grid[idx] !== mat) return; // 粒子已移动或被改变

    // 火与可燃物
    if (mat === 5) {
      interactFireWithNeighbors(x, y);
    }
    // 熔岩与水
    if (mat === 7) {
      interactLavaWithNeighbors(x, y);
    }
    // 酸溶解
    if (mat === 9) {
      interactAcidWithNeighbors(x, y);
    }
    // 植物生长
    if (mat === 10) {
      interactPlantWithNeighbors(x, y);
    }
    // 蒸汽冷凝
    if (mat === 8) {
      if (life[idx] > 0 && life[idx] < 255) {
        life[idx]--;
        if (life[idx] === 0) {
          grid[idx] = 2; // 变水
          life[idx] = 255;
        }
      }
    }
    // 烟雾寿命
    if (mat === 11) {
      if (life[idx] > 0 && life[idx] < 255) {
        life[idx]--;
        if (life[idx] === 0) {
          grid[idx] = EMPTY;
        }
      }
    }
  }

  function getNeighborCoords(x, y) {
    const coords = [];
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          coords.push({ x: nx, y: ny, idx: ny * W + nx });
        }
      }
    }
    return coords;
  }

  function interactFireWithNeighbors(x, y) {
    const neighbors = getNeighborCoords(x, y);
    for (const n of neighbors) {
      const nmat = grid[n.idx];
      if (nmat === EMPTY) continue;
      // 水灭火
      if (nmat === 2) {
        grid[n.idx] = 8; // 变蒸汽
        life[n.idx] = matById[8].lifetime;
        grid[y * W + x] = EMPTY;
        life[y * W + x] = 0;
        return;
      }
      // 点燃可燃物
      if (isFlammable(nmat) && (hash(n.x, n.y + frame) & 7) === 0) {
        grid[n.idx] = 5;
        life[n.idx] = matById[5].lifetime;
      }
    }
  }

  function interactLavaWithNeighbors(x, y) {
    const neighbors = getNeighborCoords(x, y);
    const idx = y * W + x;
    for (const n of neighbors) {
      const nmat = grid[n.idx];
      if (nmat === 2) { // 水
        grid[idx] = 3; // 熔岩变石头
        life[idx] = 255;
        grid[n.idx] = 3; // 水变石头
        life[n.idx] = 255;
        // 生成蒸汽在附近
        spreadSteam(x, y);
        return;
      }
    }
  }

  function spreadSteam(x, y) {
    const candidates = [];
    for (let dy = -2; dy <= 2; dy++) {
      for (let dx = -2; dx <= 2; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H && grid[ny * W + nx] === EMPTY) {
          candidates.push({ x: nx, y: ny });
        }
      }
    }
    // 生成2-3个蒸汽
    const count = Math.min(3, candidates.length);
    for (let i = 0; i < count; i++) {
      const idx = Math.floor(hash(x + i, y + frame) / 256 * candidates.length) % candidates.length;
      const c = candidates[idx];
      const ci = c.y * W + c.x;
      if (grid[ci] === EMPTY) {
        grid[ci] = 8;
        life[ci] = matById[8].lifetime;
      }
    }
  }

  function interactAcidWithNeighbors(x, y) {
    const neighbors = getNeighborCoords(x, y);
    for (const n of neighbors) {
      const nmat = grid[n.idx];
      if (nmat === EMPTY || nmat === 9) continue;
      // 不溶解玻璃和石头
      if (nmat === 12 || nmat === 3) continue;
      if ((hash(n.x, n.y + frame) & 15) === 0) {
        grid[n.idx] = EMPTY;
        life[n.idx] = 0;
      }
    }
  }

  function interactPlantWithNeighbors(x, y) {
    const neighbors = getNeighborCoords(x, y);
    let hasWater = false;
    for (const n of neighbors) {
      if (grid[n.idx] === 2) {
        hasWater = true;
        break;
      }
    }
    if (hasWater && (hash(x, y + frame) & 63) === 0) {
      // 生长：在空邻居中放置植物
      const emptyNeighbors = neighbors.filter(n => grid[n.idx] === EMPTY);
      if (emptyNeighbors.length > 0) {
        const pick = emptyNeighbors[hash(x, y + frame * 41) % emptyNeighbors.length];
        grid[pick.idx] = 10;
        life[pick.idx] = 255;
      }
    }
  }

  // ─── 主更新 ───
  function update() {
    if (paused && !mouseDown) return;

    // 扫描方向
    const leftToRight = (frame & 1) === 0;

    for (let y = H - 1; y >= 0; y--) {
      let x;
      if (leftToRight) {
        for (x = 0; x < W; x++) {
          processCell(x, y);
        }
      } else {
        for (x = W - 1; x >= 0; x--) {
          processCell(x, y);
        }
      }
    }

    frame++;
  }

  function processCell(x, y) {
    const idx = y * W + x;
    const mat = grid[idx];
    if (mat === EMPTY) return;

    const info = matById[mat];
    if (!info || info.type === null) return;

    switch (info.type) {
      case TYPE_POWDER: updatePowder(x, y); break;
      case TYPE_LIQUID: updateLiquid(x, y); break;
      case TYPE_GAS:    updateGas(x, y);    break;
      case TYPE_SOLID:  /* 不动 */ break;
      case TYPE_FIRE:   updateFire(x, y);   break;
    }

    checkInteractions(x, y, mat);
  }

  // ─── 主循环 ───
  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ─── 启动 ───
  buildMaterialPanel();
  updateBrushLabel();
  render(); // 初始渲染背景
  loop();
})();
