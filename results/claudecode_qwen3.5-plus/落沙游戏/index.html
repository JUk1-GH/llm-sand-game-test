<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落沙模拟游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="stats">
                <span id="fpsDisplay">FPS: 0</span>
                <span id="sandCount">沙粒数：0</span>
            </div>
        </div>

        <div class="control-panel">
            <h2>控制面板</h2>

            <!-- 材质选择 -->
            <div class="control-group">
                <h3>材质选择</h3>
                <div class="material-grid" id="materialGrid">
                    <!-- 材质按钮由 JS 动态生成 -->
                </div>
            </div>

            <!-- 颗粒大小 -->
            <div class="control-group">
                <h3>颗粒大小</h3>
                <div class="slider-container">
                    <input type="range" id="sizeSlider" min="1" max="3" step="1" value="2">
                    <div class="slider-labels">
                        <span>小</span>
                        <span>中</span>
                        <span>大</span>
                    </div>
                </div>
            </div>

            <!-- 密度调节 -->
            <div class="control-group">
                <h3>密度</h3>
                <div class="slider-container">
                    <input type="range" id="densitySlider" min="0.5" max="3" step="0.1" value="1">
                    <span id="densityValue">1.0</span>
                </div>
            </div>

            <!-- 摩擦力调节 -->
            <div class="control-group">
                <h3>摩擦力</h3>
                <div class="slider-container">
                    <input type="range" id="frictionSlider" min="0" max="1" step="0.05" value="0.3">
                    <span id="frictionValue">0.30</span>
                </div>
            </div>

            <!-- 弹性调节 -->
            <div class="control-group">
                <h3>弹性</h3>
                <div class="slider-container">
                    <input type="range" id="restitutionSlider" min="0" max="1" step="0.05" value="0.1">
                    <span id="restitutionValue">0.10</span>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="control-group">
                <h3>操作</h3>
                <div class="button-group">
                    <button id="clearBtn" class="btn btn-danger">清空</button>
                    <button id="resetBtn" class="btn btn-secondary">重置</button>
                </div>
            </div>

            <!-- 放置模式 -->
            <div class="control-group">
                <h3>放置模式</h3>
                <div class="button-group">
                    <button id="singleBtn" class="btn btn-primary active">单击</button>
                    <button id="continuousBtn" class="btn btn-primary">连续</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="materials.js"></script>
    <script src="game.js"></script>
</body>
</html>
