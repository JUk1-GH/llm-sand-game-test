<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>落沙模拟游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
        }

        h1 {
            margin-bottom: 15px;
            color: #f0a500;
            text-shadow: 0 0 10px rgba(240, 165, 0, 0.5);
        }

        .game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        canvas {
            border: 3px solid #444;
            border-radius: 8px;
            cursor: crosshair;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .controls {
            background: #252540;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 200px;
        }

        .material-btn {
            padding: 12px 16px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .material-btn:hover {
            transform: translateX(5px);
        }

        .material-btn.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .material-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .clear-btn {
            background: #e74c3c;
            color: white;
        }

        .clear-btn:hover {
            background: #c0392b;
        }

        .pause-btn {
            background: #3498db;
            color: white;
        }

        .pause-btn:hover {
            background: #2980b9;
        }

        .size-slider {
            width: 100%;
            margin-top: 5px;
        }

        .size-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .info {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid #444;
            font-size: 12px;
            color: #888;
        }

        .fps {
            font-family: monospace;
            color: #0f0;
        }
    </style>
</head>
<body>
    <h1>🏜️ 落沙模拟</h1>

    <div class="game-container">
        <canvas id="gameCanvas" width="640" height="480"></canvas>

        <div class="controls">
            <div class="size-label">画笔大小：<span id="brushSize">3</span></div>
            <input type="range" class="size-slider" id="brushSlider" min="1" max="10" value="3">

            <div id="materialButtons"></div>

            <button class="action-btn pause-btn" id="pauseBtn">⏸️ 暂停</button>
            <button class="action-btn clear-btn" id="clearBtn">🗑️ 清空</button>

            <div class="info">
                <div>FPS: <span class="fps" id="fps">0</span></div>
                <div>粒子数：<span id="particleCount">0</span></div>
            </div>
        </div>
    </div>

    <script>
        // 材质定义
        const Materials = {
            AIR: 0,
            SAND: 1,
            WATER: 2,
            STONE: 3,
            FIRE: 4,
            WOOD: 5,
            GUNPOWDER: 6,
            OIL: 7,
            ACID: 8,
            PLANT: 9,
            SMOKE: 10,
            LAVA: 11
        };

        // 材质属性
        const MaterialProps = {
            [Materials.AIR]: { name: '空气', color: [0, 0, 0, 0] },
            [Materials.SAND]: { name: '沙子', color: [235, 200, 100, 255] },
            [Materials.WATER]: { name: '水', color: [64, 164, 223, 200] },
            [Materials.STONE]: { name: '石头', color: [128, 128, 128, 255] },
            [Materials.FIRE]: { name: '火', color: [255, 100, 0, 255] },
            [Materials.WOOD]: { name: '木头', color: [139, 90, 43, 255] },
            [Materials.GUNPOWDER]: { name: '火药', color: [50, 50, 50, 255] },
            [Materials.OIL]: { name: '油', color: [60, 40, 20, 220] },
            [Materials.ACID]: { name: '酸', color: [100, 255, 50, 200] },
            [Materials.PLANT]: { name: '植物', color: [34, 139, 34, 255] },
            [Materials.SMOKE]: { name: '烟', color: [150, 150, 150, 150] },
            [Materials.LAVA]: { name: '熔岩', color: [207, 16, 32, 255] }
        };

        // 游戏配置
        const CONFIG = {
            CELL_SIZE: 4,
            FPS_TARGET: 60
        };

        // 计算网格尺寸
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRID_WIDTH = Math.floor(canvas.width / CONFIG.CELL_SIZE);
        const GRID_HEIGHT = Math.floor(canvas.height / CONFIG.CELL_SIZE);

        // 游戏状态
        let grid = new Uint8Array(GRID_WIDTH * GRID_HEIGHT);
        let lifeGrid = new Uint8Array(GRID_WIDTH * GRID_HEIGHT); // 用于火、烟等生命周期
        let isPaused = false;
        let currentMaterial = Materials.SAND;
        let brushSize = 3;
        let isMouseDown = false;
        let mouseX = 0;
        let mouseY = 0;
        let lastFrameTime = 0;
        let frameCount = 0;
        let fps = 0;

        // 创建材质按钮
        function createMaterialButtons() {
            const container = document.getElementById('materialButtons');
            Object.entries(Materials).forEach(([key, value]) => {
                if (key === 'AIR') return; // 跳过空气
                const props = MaterialProps[value];
                const btn = document.createElement('button');
                btn.className = 'material-btn';
                if (value === currentMaterial) btn.classList.add('active');
                const [r, g, b, a] = props.color;
                btn.innerHTML = `
                    <div class="material-color" style="background: rgba(${r},${g},${b},${a/255})"></div>
                    ${props.name}
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.material-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMaterial = value;
                };
                container.appendChild(btn);
            });
        }

        // 获取网格索引
        function getIdx(x, y) {
            return y * GRID_WIDTH + x;
        }

        // 检查边界
        function inBounds(x, y) {
            return x >= 0 && x < GRID_WIDTH && y >= 0 && y < GRID_HEIGHT;
        }

        // 获取随机整数
        function randomInt(max) {
            return Math.floor(Math.random() * max);
        }

        // 交换两个格子的值
        function swap(idx1, idx2) {
            const temp = grid[idx1];
            grid[idx1] = grid[idx2];
            grid[idx2] = temp;
            const tempLife = lifeGrid[idx1];
            lifeGrid[idx1] = lifeGrid[idx2];
            lifeGrid[idx2] = tempLife;
        }

        // 更新沙子
        function updateSand(x, y, idx) {
            if (y >= GRID_HEIGHT - 1) return; // 底部

            const below = getIdx(x, y + 1);
            const belowLeft = getIdx(x - 1, y + 1);
            const belowRight = getIdx(x + 1, y + 1);

            // 优先向下
            if (inBounds(x, y + 1) && grid[below] === Materials.AIR) {
                swap(idx, below);
            }
            // 向下左或向下右
            else if (Math.random() < 0.5) {
                if (inBounds(x - 1, y + 1) && grid[belowLeft] === Materials.AIR) {
                    swap(idx, belowLeft);
                } else if (inBounds(x + 1, y + 1) && grid[belowRight] === Materials.AIR) {
                    swap(idx, belowRight);
                }
            } else {
                if (inBounds(x + 1, y + 1) && grid[belowRight] === Materials.AIR) {
                    swap(idx, belowRight);
                } else if (inBounds(x - 1, y + 1) && grid[belowLeft] === Materials.AIR) {
                    swap(idx, belowLeft);
                }
            }

            // 在水中下沉
            if (inBounds(x, y + 1) && grid[below] === Materials.WATER) {
                swap(idx, below);
            }
        }

        // 更新水
        function updateWater(x, y, idx) {
            if (y >= GRID_HEIGHT - 1) return;

            const below = getIdx(x, y + 1);
            const left = getIdx(x - 1, y);
            const right = getIdx(x + 1, y);

            // 优先向下
            if (inBounds(x, y + 1) && grid[below] === Materials.AIR) {
                swap(idx, below);
            }
            // 水平流动
            else {
                const dir = Math.random() < 0.5 ? -1 : 1;
                if (inBounds(x + dir, y) && grid[getIdx(x + dir, y)] === Materials.AIR) {
                    swap(idx, getIdx(x + dir, y));
                } else if (inBounds(x - dir, y) && grid[getIdx(x - dir, y)] === Materials.AIR) {
                    swap(idx, getIdx(x - dir, y));
                }
            }
        }

        // 更新火
        function updateFire(x, y, idx) {
            // 生命周期减少
            lifeGrid[idx]--;
            if (lifeGrid[idx] === 0) {
                grid[idx] = Materials.SMOKE;
                lifeGrid[idx] = 20 + randomInt(20);
                return;
            }

            // 向上飘动
            const above = getIdx(x, y - 1);
            const aboveLeft = getIdx(x - 1, y - 1);
            const aboveRight = getIdx(x + 1, y - 1);

            const targets = [];
            if (inBounds(x, y - 1) && grid[above] === Materials.AIR) targets.push(above);
            if (inBounds(x - 1, y - 1) && grid[aboveLeft] === Materials.AIR) targets.push(aboveLeft);
            if (inBounds(x + 1, y - 1) && grid[aboveRight] === Materials.AIR) targets.push(aboveRight);

            if (targets.length > 0) {
                const target = targets[randomInt(targets.length)];
                swap(idx, target);
            }

            // 点燃周围
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = x + dx, ny = y + dy;
                    if (inBounds(nx, ny)) {
                        const nidx = getIdx(nx, ny);
                        if (grid[nidx] === Materials.WOOD) {
                            if (Math.random() < 0.02) {
                                grid[nidx] = Materials.FIRE;
                                lifeGrid[nidx] = 100 + randomInt(50);
                            }
                        } else if (grid[nidx] === Materials.GUNPOWDER) {
                            // 点燃火药
                            grid[nidx] = Materials.FIRE;
                            lifeGrid[nidx] = 5;
                        } else if (grid[nidx] === Materials.OIL) {
                            if (Math.random() < 0.1) {
                                grid[nidx] = Materials.FIRE;
                                lifeGrid[nidx] = 30 + randomInt(20);
                            }
                        } else if (grid[nidx] === Materials.PLANT) {
                            if (Math.random() < 0.05) {
                                grid[nidx] = Materials.FIRE;
                                lifeGrid[nidx] = 50 + randomInt(30);
                            }
                        }
                    }
                }
            }

            // 融化石头成熔岩
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = x + dx, ny = y + dy;
                    if (inBounds(nx, ny)) {
                        const nidx = getIdx(nx, ny);
                        if (grid[nidx] === Materials.STONE && Math.random() < 0.005) {
                            grid[nidx] = Materials.LAVA;
                            lifeGrid[nidx] = 0;
                        }
                    }
                }
            }
        }

        // 更新烟
        function updateSmoke(x, y, idx) {
            lifeGrid[idx]--;
            if (lifeGrid[idx] === 0) {
                grid[idx] = Materials.AIR;
                return;
            }

            // 向上飘 + 随机
            const dir = randomInt(3) - 1; // -1, 0, 1
            if (y > 0 && grid[getIdx(x + dir, y - 1)] === Materials.AIR && inBounds(x + dir, y - 1)) {
                swap(idx, getIdx(x + dir, y - 1));
            } else if (y > 0 && grid[getIdx(x, y - 1)] === Materials.AIR) {
                swap(idx, getIdx(x, y - 1));
            }
        }

        // 更新酸
        function updateAcid(x, y, idx) {
            if (y >= GRID_HEIGHT - 1) return;

            const below = getIdx(x, y + 1);

            // 腐蚀下方
            if (inBounds(x, y + 1) && grid[below] !== Materials.AIR &&
                grid[below] !== Materials.ACID && grid[below] !== Materials.GLASS) {
                if (Math.random() < 0.1) {
                    grid[below] = Materials.AIR;
                    if (Math.random() < 0.3) {
                        grid[idx] = Materials.SMOKE;
                        lifeGrid[idx] = 20;
                    }
                    return;
                }
            }

            // 像水一样流动
            updateWater(x, y, idx);
        }

        // 更新熔岩
        function updateLava(x, y, idx) {
            // 缓慢流动，类似水但更慢
            if (Math.random() > 0.3) return; // 降低流动速度

            if (y >= GRID_HEIGHT - 1) return;

            const below = getIdx(x, y + 1);
            const left = getIdx(x - 1, y);
            const right = getIdx(x + 1, y);

            if (inBounds(x, y + 1) && (grid[below] === Materials.AIR || grid[below] === Materials.WATER)) {
                if (grid[below] === Materials.WATER) {
                    grid[below] = Materials.STONE; // 水变石头
                    grid[idx] = Materials.OBSIDIAN || Materials.STONE;
                    return;
                }
                swap(idx, below);
            } else {
                const dir = Math.random() < 0.5 ? -1 : 1;
                if (inBounds(x + dir, y) && grid[getIdx(x + dir, y)] === Materials.AIR) {
                    swap(idx, getIdx(x + dir, y));
                } else if (inBounds(x - dir, y) && grid[getIdx(x - dir, y)] === Materials.AIR) {
                    swap(idx, getIdx(x - dir, y));
                }
            }

            // 点燃周围
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = x + dx, ny = y + dy;
                    if (inBounds(nx, ny)) {
                        const nidx = getIdx(nx, ny);
                        if (grid[nidx] === Materials.WOOD || grid[nidx] === Materials.PLANT) {
                            if (Math.random() < 0.05) {
                                grid[nidx] = Materials.FIRE;
                                lifeGrid[nidx] = 100 + randomInt(50);
                            }
                        }
                    }
                }
            }
        }

        // 更新火药
        function updateGunpowder(x, y, idx) {
            // 火药本身不主动更新，只在被点燃时反应
        }

        // 更新植物
        function updatePlant(x, y, idx) {
            // 检查周围是否有水
            let hasWater = false;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = x + dx, ny = y + dy;
                    if (inBounds(nx, ny) && grid[getIdx(nx, ny)] === Materials.WATER) {
                        hasWater = true;
                        break;
                    }
                }
                if (hasWater) break;
            }

            // 有水的几率生长
            if (hasWater && Math.random() < 0.01) {
                const growDir = randomInt(4);
                let nx = x, ny = y - 1; // 默认向上
                if (growDir === 0) nx = x - 1;
                else if (growDir === 1) nx = x + 1;
                else if (growDir === 2) ny = y + 1;

                if (inBounds(nx, ny) && grid[getIdx(nx, ny)] === Materials.AIR) {
                    grid[getIdx(nx, ny)] = Materials.PLANT;
                }
            }
        }

        // 主更新函数
        function update() {
            if (isPaused) return;

            // 从下往上更新（避免一帧内多次移动）
            for (let y = GRID_HEIGHT - 1; y >= 0; y--) {
                // 左右随机，避免粒子总是向同一方向倾斜
                const leftToRight = Math.random() < 0.5;
                for (let i = 0; i < GRID_WIDTH; i++) {
                    const x = leftToRight ? i : GRID_WIDTH - 1 - i;
                    const idx = getIdx(x, y);
                    const material = grid[idx];

                    switch (material) {
                        case Materials.SAND:
                            updateSand(x, y, idx);
                            break;
                        case Materials.WATER:
                            updateWater(x, y, idx);
                            break;
                        case Materials.FIRE:
                            updateFire(x, y, idx);
                            break;
                        case Materials.SMOKE:
                            updateSmoke(x, y, idx);
                            break;
                        case Materials.ACID:
                            updateAcid(x, y, idx);
                            break;
                        case Materials.LAVA:
                            updateLava(x, y, idx);
                            break;
                        case Materials.PLANT:
                            updatePlant(x, y, idx);
                            break;
                    }
                }
            }
        }

        // 渲染函数
        function render() {
            // 清空画布
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制每个非空气单元格
            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const idx = getIdx(x, y);
                    const material = grid[idx];
                    if (material !== Materials.AIR) {
                        const props = MaterialProps[material];
                        const [r, g, b, a] = props.color;

                        // 添加一些视觉变化
                        let variation = 0;
                        if (material === Materials.SAND) {
                            variation = (x * 7 + y * 13) % 20 - 10;
                        } else if (material === Materials.WATER) {
                            variation = Math.sin(x * 0.1 + y * 0.05 + Date.now() * 0.002) * 10;
                        } else if (material === Materials.FIRE) {
                            variation = Math.random() * 30 - 15;
                        } else if (material === Materials.LAVA) {
                            variation = Math.sin(Date.now() * 0.005 + x * 0.2) * 20;
                        }

                        ctx.fillStyle = `rgba(
                            ${Math.min(255, Math.max(0, r + variation))},
                            ${Math.min(255, Math.max(0, g + variation))},
                            ${Math.min(255, Math.max(0, b + variation))},
                            ${a / 255}
                        )`;

                        const px = x * CONFIG.CELL_SIZE;
                        const py = y * CONFIG.CELL_SIZE;
                        ctx.fillRect(px, py, CONFIG.CELL_SIZE, CONFIG.CELL_SIZE);
                    }
                }
            }

            // 绘制笔刷预览
            if (isMouseDown) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, brushSize * CONFIG.CELL_SIZE, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // 放置材质
        function placeMaterial(canvasX, canvasY) {
            const gridX = Math.floor(canvasX / CONFIG.CELL_SIZE);
            const gridY = Math.floor(canvasY / CONFIG.CELL_SIZE);

            for (let dy = -brushSize; dy <= brushSize; dy++) {
                for (let dx = -brushSize; dx <= brushSize; dx++) {
                    if (dx * dx + dy * dy <= brushSize * brushSize) {
                        const nx = gridX + dx;
                        const ny = gridY + dy;
                        if (inBounds(nx, ny)) {
                            const idx = getIdx(nx, ny);
                            // 只在空气或相同材质上放置
                            if (grid[idx] === Materials.AIR || grid[idx] === currentMaterial) {
                                grid[idx] = currentMaterial;
                                if (currentMaterial === Materials.FIRE) {
                                    lifeGrid[idx] = 100 + randomInt(50);
                                } else if (currentMaterial === Materials.SMOKE) {
                                    lifeGrid[idx] = 30 + randomInt(20);
                                }
                            }
                        }
                    }
                }
            }
        }

        // 计算 FPS
        function updateFPS() {
            frameCount++;
            const now = performance.now();
            if (now - lastFrameTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFrameTime = now;
                document.getElementById('fps').textContent = fps;
            }
        }

        // 计算粒子数
        function updateParticleCount() {
            let count = 0;
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] !== Materials.AIR) count++;
            }
            document.getElementById('particleCount').textContent = count;
        }

        // 游戏主循环
        function gameLoop() {
            update();
            render();
            updateFPS();
            updateParticleCount();
            requestAnimationFrame(gameLoop);
        }

        // 事件处理
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            placeMaterial(mouseX, mouseY);
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            if (isMouseDown) {
                placeMaterial(mouseX, mouseY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
            placeMaterial(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
            placeMaterial(mouseX, mouseY);
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // 按钮事件
        document.getElementById('brushSlider').addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('brushSize').textContent = brushSize;
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            grid = new Uint8Array(GRID_WIDTH * GRID_HEIGHT);
            lifeGrid = new Uint8Array(GRID_WIDTH * GRID_HEIGHT);
        });

        // 初始化
        createMaterialButtons();
        gameLoop();
    </script>
</body>
</html>
