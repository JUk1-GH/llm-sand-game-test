<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>落沙模拟游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
#toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 8px 12px; background: #16213e; width: 800px; border-bottom: 2px solid #0f3460; }
.mat-btn { border: 2px solid transparent; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 13px; color: #fff; transition: border-color .15s; background: #333; }
.mat-btn.active { border-color: #e94560; box-shadow: 0 0 6px #e94560aa; }
.mat-btn:hover { border-color: #e9456088; }
#controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
#controls label { font-size: 13px; }
#brushSize { width: 80px; accent-color: #e94560; }
.ctrl-btn { background: #0f3460; border: 1px solid #e94560; color: #eee; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.ctrl-btn:hover { background: #e94560; }
#fps { font-size: 13px; color: #e94560; min-width: 70px; text-align: right; }
canvas { display: block; cursor: crosshair; background: #000; }
</style>
</head>
<body>
<div id="toolbar"></div>
<canvas id="canvas" width="800" height="600"></canvas>
<script>
// ── Constants ──
const W = 400, H = 300, SCALE = 2;
const EMPTY=0, SAND=1, WATER=2, STONE=3, FIRE=4, STEAM=5, OIL=6, LAVA=7, WOOD=8, GUNPOWDER=9, ACID=10;

const MATERIALS = {
  [EMPTY]:     { name:'Eraser',  color:[30,30,46],    type:'empty', density:0, flammable:false },
  [SAND]:      { name:'Sand',    color:[194,178,128],  type:'powder', density:8, flammable:false },
  [WATER]:     { name:'Water',   color:[28,107,186],   type:'liquid', density:4, flammable:false },
  [STONE]:     { name:'Stone',   color:[136,140,141],  type:'solid', density:99, flammable:false },
  [FIRE]:      { name:'Fire',    color:[226,88,34],    type:'gas', density:0, flammable:false, life:60 },
  [STEAM]:     { name:'Steam',   color:[200,220,240],  type:'gas', density:0, flammable:false, life:200 },
  [OIL]:       { name:'Oil',     color:[80,60,20],     type:'liquid', density:2, flammable:true },
  [LAVA]:      { name:'Lava',    color:[207,16,32],    type:'liquid', density:10, flammable:false },
  [WOOD]:      { name:'Wood',    color:[101,67,33],    type:'solid', density:99, flammable:true },
  [GUNPOWDER]: { name:'Gunpowder', color:[90,90,90],  type:'powder', density:7, flammable:true },
  [ACID]:      { name:'Acid',    color:[128,255,0],    type:'liquid', density:5, flammable:false },
};

// ── Grid State ──
const grid = new Uint8Array(W * H);
const meta = new Uint16Array(W * H); // life / temperature
const updated = new Uint8Array(W * H);
let frame = 0;

// ── Helpers ──
const idx = (x, y) => y * W + x;
const inBounds = (x, y) => x >= 0 && x < W && y >= 0 && y < H;
const get = (x, y) => inBounds(x, y) ? grid[idx(x, y)] : STONE;
const isEmpty = (x, y) => inBounds(x, y) && grid[idx(x, y)] === EMPTY;
const set = (x, y, mat) => { if (inBounds(x, y)) { const i = idx(x, y); grid[i] = mat; if (MATERIALS[mat].life) meta[i] = MATERIALS[mat].life + (Math.random() * 40 | 0); } };
const swap = (x1, y1, x2, y2) => { const i1 = idx(x1,y1), i2 = idx(x2,y2); const t = grid[i1]; grid[i1] = grid[i2]; grid[i2] = t; const tm = meta[i1]; meta[i1] = meta[i2]; meta[i2] = tm; updated[i2] = 1; };
const clear = (x, y) => { if (inBounds(x, y)) { const i = idx(x, y); grid[i] = EMPTY; meta[i] = 0; } };

// ── Canvas Setup ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(W * SCALE, H * SCALE);
const pixels = imageData.data;

// ── UI Setup ──
let selectedMat = SAND;
let brushSize = 3;
let paused = false;

const toolbar = document.getElementById('toolbar');
// Material buttons
[SAND, WATER, STONE, FIRE, OIL, LAVA, WOOD, GUNPOWDER, ACID, STEAM, EMPTY].forEach(id => {
  const btn = document.createElement('button');
  btn.className = 'mat-btn' + (id === selectedMat ? ' active' : '');
  btn.textContent = MATERIALS[id].name;
  const c = MATERIALS[id].color;
  btn.style.background = `rgb(${c[0]},${c[1]},${c[2]})`;
  btn.style.color = (c[0]+c[1]+c[2]) > 400 ? '#000' : '#fff';
  btn.onclick = () => { document.querySelectorAll('.mat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedMat = id; };
  toolbar.appendChild(btn);
});

// Controls
const controls = document.createElement('div');
controls.id = 'controls';
controls.innerHTML = `<label>Brush: <input type="range" id="brushSize" min="1" max="20" value="3"></label>
<button class="ctrl-btn" id="pauseBtn">⏸</button>
<button class="ctrl-btn" id="clearBtn">Clear</button>
<span id="fps">0 FPS</span>`;
toolbar.appendChild(controls);

document.getElementById('brushSize').oninput = e => brushSize = +e.target.value;
document.getElementById('pauseBtn').onclick = () => { paused = !paused; document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸'; };
document.getElementById('clearBtn').onclick = () => { grid.fill(0); meta.fill(0); };

// ── Input Handling ──
let mouseDown = false, mouseX = 0, mouseY = 0;
const getGridPos = e => {
  const r = canvas.getBoundingClientRect();
  const cx = (e.clientX ?? e.touches[0].clientX) - r.left;
  const cy = (e.clientY ?? e.touches[0].clientY) - r.top;
  return [Math.floor(cx / SCALE), Math.floor(cy / SCALE)];
};
const paint = () => {
  const r = brushSize;
  for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
    if (dx*dx + dy*dy > r*r) continue;
    const px = mouseX + dx, py = mouseY + dy;
    if (!inBounds(px, py)) continue;
    if (selectedMat === EMPTY) { clear(px, py); }
    else if (grid[idx(px, py)] === EMPTY) {
      if (Math.random() < 0.6) set(px, py, selectedMat);
    }
  }
};
canvas.addEventListener('mousedown', e => { mouseDown = true; [mouseX, mouseY] = getGridPos(e); paint(); });
canvas.addEventListener('mousemove', e => { if (mouseDown) { [mouseX, mouseY] = getGridPos(e); paint(); } });
window.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); mouseDown = true; [mouseX, mouseY] = getGridPos(e); paint(); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (mouseDown) { [mouseX, mouseY] = getGridPos(e); paint(); } }, { passive: false });
canvas.addEventListener('touchend', () => mouseDown = false);

// ── Physics ──
function canDisplace(src, tx, ty) {
  if (!inBounds(tx, ty)) return false;
  const dst = grid[idx(tx, ty)];
  if (dst === EMPTY) return true;
  const sd = MATERIALS[src].density, dd = MATERIALS[dst].density;
  const st = MATERIALS[src].type, dt = MATERIALS[dst].type;
  if (dt === 'solid') return false;
  if (st === 'powder' && (dt === 'liquid' || dt === 'gas') && sd > dd) return true;
  if (st === 'liquid' && dt === 'liquid' && sd > dd) return true;
  if (st === 'liquid' && dt === 'gas') return true;
  return false;
}

function tryMove(x, y, nx, ny) {
  if (!inBounds(nx, ny)) return false;
  const dst = grid[idx(nx, ny)];
  if (dst === EMPTY) { swap(x, y, nx, ny); return true; }
  if (canDisplace(grid[idx(x, y)], nx, ny)) { swap(x, y, nx, ny); return true; }
  return false;
}

function neighbors4(x, y) {
  const r = [];
  if (x > 0) r.push([x-1, y]);
  if (x < W-1) r.push([x+1, y]);
  if (y > 0) r.push([x, y-1]);
  if (y < H-1) r.push([x, y+1]);
  return r;
}

function explode(cx, cy, radius) {
  for (let dy = -radius; dy <= radius; dy++) for (let dx = -radius; dx <= radius; dx++) {
    if (dx*dx + dy*dy > radius*radius) continue;
    const nx = cx+dx, ny = cy+dy;
    if (!inBounds(nx, ny)) continue;
    const m = grid[idx(nx, ny)];
    if (m === EMPTY) continue;
    if (m === STONE) continue;
    if (Math.random() < 0.7) {
      if (MATERIALS[m].flammable) set(nx, ny, FIRE);
      else clear(nx, ny);
    }
  }
}

function updateCell(x, y) {
  const i = idx(x, y);
  if (updated[i]) return;
  const mat = grid[i];
  if (mat === EMPTY) return;
  updated[i] = 1;
  const info = MATERIALS[mat];
  const dir = Math.random() < 0.5 ? -1 : 1;

  // Life decay for fire and steam
  if (mat === FIRE || mat === STEAM) {
    meta[i]--;
    if (meta[i] <= 0) {
      if (mat === STEAM && Math.random() < 0.3) set(x, y, WATER);
      else clear(x, y);
      return;
    }
  }

  // ── Interactions ──
  const nbrs = neighbors4(x, y);
  for (const [nx, ny] of nbrs) {
    const ni = idx(nx, ny);
    const other = grid[ni];
    if (other === EMPTY) continue;

    // Fire interactions
    if (mat === FIRE) {
      if (other === WATER) { clear(x, y); set(nx, ny, STEAM); return; }
      if (other === WOOD && Math.random() < 0.02) { set(nx, ny, FIRE); }
      if (other === OIL && Math.random() < 0.15) { set(nx, ny, FIRE); }
      if (other === GUNPOWDER) { explode(nx, ny, 6); return; }
    }
    // Lava interactions
    if (mat === LAVA) {
      if (other === WATER) { set(x, y, STONE); set(nx, ny, STEAM); return; }
      if (other === WOOD && Math.random() < 0.05) { set(nx, ny, FIRE); }
      if (other === OIL && Math.random() < 0.2) { set(nx, ny, FIRE); }
      if (other === GUNPOWDER) { explode(nx, ny, 6); return; }
      // Lava slowly cools
      if (Math.random() < 0.0005) { set(x, y, STONE); return; }
    }
    // Water extinguishes fire neighbor (handled from fire side too)
    if (mat === WATER && other === FIRE) { set(nx, ny, STEAM); }
    // Water + lava
    if (mat === WATER && other === LAVA) { set(nx, ny, STONE); set(x, y, STEAM); return; }
    // Acid dissolves
    if (mat === ACID && other !== ACID && other !== EMPTY) {
      if (other === STONE && Math.random() < 0.02) { clear(nx, ny); if (Math.random()<0.5) clear(x,y); return; }
      if (other !== STONE && Math.random() < 0.08) { clear(nx, ny); if (Math.random()<0.4) clear(x,y); return; }
    }
  }

  // ── Movement ──
  if (info.type === 'powder') {
    if (tryMove(x, y, x, y+1)) return;
    if (tryMove(x, y, x+dir, y+1)) return;
    if (tryMove(x, y, x-dir, y+1)) return;
  }
  else if (info.type === 'liquid') {
    if (tryMove(x, y, x, y+1)) return;
    if (tryMove(x, y, x+dir, y+1)) return;
    if (tryMove(x, y, x-dir, y+1)) return;
    const spread = mat === LAVA ? 1 : 3;
    for (let s = 0; s < spread; s++) {
      if (tryMove(x, y, x+dir, y)) return;
      if (tryMove(x, y, x-dir, y)) return;
    }
  }
  else if (info.type === 'gas') {
    if (tryMove(x, y, x, y-1)) return;
    if (tryMove(x, y, x+dir, y-1)) return;
    if (tryMove(x, y, x-dir, y-1)) return;
    if (Math.random() < 0.4) tryMove(x, y, x+dir, y);
  }
}

function simulate() {
  updated.fill(0);
  frame++;
  // Bottom-up scan, randomize horizontal direction per row
  for (let y = H - 1; y >= 0; y--) {
    const leftToRight = Math.random() < 0.5;
    for (let xi = 0; xi < W; xi++) {
      const x = leftToRight ? xi : (W - 1 - xi);
      updateCell(x, y);
    }
  }
}

// ── Rendering ──
function getColor(mat, i) {
  const base = MATERIALS[mat].color;
  let r = base[0], g = base[1], b = base[2];
  // Per-pixel noise for visual variety
  const noise = ((i * 2654435761) >>> 16) % 20 - 10;

  if (mat === FIRE) {
    const life = meta[i];
    const t = life / 100;
    r = 255; g = Math.min(255, 60 + t * 180 + noise * 3); b = noise > 0 ? noise * 5 : 0;
  } else if (mat === LAVA) {
    const flicker = Math.sin(frame * 0.1 + i) * 30;
    r = Math.min(255, 207 + flicker); g = Math.min(255, 50 + flicker); b = 10;
  } else if (mat === STEAM) {
    const fade = meta[i] / 240;
    r = 180 + fade * 60; g = 200 + fade * 40; b = 230 + fade * 20;
  } else if (mat === WATER) {
    r += noise; g += noise; b = Math.min(255, b + 20 + noise);
  } else if (mat === ACID) {
    const pulse = Math.sin(frame * 0.15 + i * 0.01) * 20;
    r += noise; g = Math.min(255, g + pulse); b += noise;
  } else {
    r += noise; g += noise; b += noise;
  }
  return [Math.max(0, Math.min(255, r)), Math.max(0, Math.min(255, g)), Math.max(0, Math.min(255, b))];
}

function render() {
  const stride = W * SCALE * 4;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = idx(x, y);
      const mat = grid[i];
      let r, g, b;
      if (mat === EMPTY) { r = 30; g = 30; b = 46; }
      else { [r, g, b] = getColor(mat, i); }
      // Write 2x2 block
      for (let sy = 0; sy < SCALE; sy++) {
        const base = (y * SCALE + sy) * stride + x * SCALE * 4;
        for (let sx = 0; sx < SCALE; sx++) {
          const p = base + sx * 4;
          pixels[p] = r; pixels[p+1] = g; pixels[p+2] = b; pixels[p+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

// ── Game Loop ──
let lastTime = performance.now(), fpsAccum = 0, fpsCount = 0;
const fpsEl = document.getElementById('fps');

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;
  fpsAccum += dt; fpsCount++;
  if (fpsAccum >= 500) {
    fpsEl.textContent = (1000 * fpsCount / fpsAccum).toFixed(0) + ' FPS';
    fpsAccum = 0; fpsCount = 0;
  }
  if (mouseDown) paint();
  if (!paused) simulate();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
