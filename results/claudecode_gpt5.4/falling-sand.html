<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>落沙实验室</title>
    <base href="./" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1018;
        --bg-soft: #141d2a;
        --panel: rgba(20, 29, 42, 0.86);
        --panel-strong: rgba(24, 35, 50, 0.95);
        --border: rgba(145, 175, 214, 0.2);
        --text: #eaf2ff;
        --muted: #9db0cb;
        --accent: #65c3ff;
        --accent-strong: #2d9fff;
        --danger: #ff7b7b;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(61, 94, 140, 0.28), transparent 36%),
          linear-gradient(180deg, #101826 0%, var(--bg) 100%);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(36, 49, 68, 0.84);
        color: var(--text);
        padding: 0.72rem 0.95rem;
        cursor: pointer;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        border-color: rgba(101, 195, 255, 0.5);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      }

      button.active,
      button:focus-visible {
        outline: none;
        border-color: rgba(101, 195, 255, 0.75);
        background: rgba(48, 87, 127, 0.5);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      input[type="range"] {
        width: 100%;
      }

      .app-shell {
        width: min(1320px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.76rem;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      .subtitle,
      .hint,
      .canvas-toolbar span,
      .stat-label,
      .control-group label span,
      .help-list {
        color: var(--muted);
      }

      .status-bar,
      .stat-grid {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
        background: rgba(101, 195, 255, 0.18);
        color: #d8efff;
        border: 1px solid rgba(101, 195, 255, 0.3);
      }

      .pill-muted {
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        border-color: rgba(255, 255, 255, 0.1);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 20px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .play-area {
        padding: 18px;
      }

      .canvas-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .inline-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .canvas-frame {
        display: flex;
        justify-content: center;
        align-items: center;
        background: #091019;
        border: 1px solid rgba(105, 146, 201, 0.22);
        border-radius: 18px;
        padding: 12px;
        overflow: auto;
      }

      canvas {
        display: block;
        width: min(100%, 960px);
        height: auto;
        image-rendering: pixelated;
        background: #05080d;
        border-radius: 12px;
      }

      .control-column {
        display: grid;
        gap: 16px;
      }

      .controls-panel {
        padding: 18px;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .material-button {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: flex-start;
      }

      .material-swatch {
        width: 16px;
        height: 16px;
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        flex: none;
      }

      .control-group {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .button-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .button-stack {
        grid-template-columns: 1fr;
      }

      .stats-panel {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .stat-card {
        padding: 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .stat-value {
        display: block;
        margin-top: 6px;
        font-size: 1.15rem;
        font-weight: 700;
        color: #f4f8ff;
      }

      .help-list {
        margin: 12px 0 0;
        padding-left: 18px;
        line-height: 1.55;
      }

      .hint {
        margin: 14px 0 0;
        line-height: 1.5;
        font-size: 0.95rem;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .control-column {
          grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }
      }

      @media (max-width: 640px) {
        .app-shell {
          width: min(100vw - 20px, 100%);
          padding-top: 16px;
        }

        .app-header,
        .canvas-toolbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .palette,
        .button-grid,
        .stats-panel {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Single-file Canvas + Matter.js</p>
          <h1>落沙实验室</h1>
          <p class="subtitle">在像素网格里堆沙、灌水、点火，并观察刚体容器、球体与障碍如何和材料互动。</p>
        </div>
        <div class="status-bar">
          <span id="simulationStatus" class="pill">运行中</span>
          <span id="rigidStatus" class="pill pill-muted">刚体层开启</span>
          <span id="activeMaterialLabel" class="pill pill-muted">当前材质：沙子</span>
        </div>
      </header>

      <main class="layout">
        <section class="play-area panel">
          <div class="canvas-toolbar">
            <div>
              <strong>模拟画布</strong>
              <span>左键绘制，右键擦除，滚轮调画笔；可直接拖拽刚体。</span>
            </div>
            <label class="inline-toggle">
              <input id="showGrid" type="checkbox" checked />
              <span>显示网格</span>
            </label>
          </div>
          <div class="canvas-frame">
            <canvas id="worldCanvas" width="960" height="640"></canvas>
          </div>
        </section>

        <aside class="control-column">
          <section class="panel controls-panel">
            <h2>材质</h2>
            <div id="materialPalette" class="palette"></div>
          </section>

          <section class="panel controls-panel">
            <h2>控制</h2>
            <div class="control-group">
              <label for="brushSize">画笔大小 <span id="brushSizeValue">4</span></label>
              <input id="brushSize" type="range" min="1" max="14" value="4" />
            </div>
            <div class="control-group button-grid">
              <button id="pauseButton" type="button">暂停</button>
              <button id="stepButton" type="button">单步</button>
              <button id="clearButton" type="button">清空</button>
              <button id="resetButton" type="button">重置场景</button>
            </div>
          </section>

          <section class="panel controls-panel">
            <h2>刚体与场景</h2>
            <div class="control-group button-grid">
              <button id="sprinkleButton" type="button">随机撒料</button>
              <button id="spawnBallButton" type="button">掉落球体</button>
              <button id="rigidToggleButton" type="button">关闭刚体层</button>
              <button id="rebuildPhysicsButton" type="button">重置物理</button>
            </div>
            <p class="hint">刚体层由 Matter.js 管理，网格材料会阻挡刚体，并对球体施加浮力与阻尼。</p>
          </section>

          <section class="panel controls-panel">
            <h2>状态</h2>
            <div class="stats-panel">
              <div class="stat-card">
                <span class="stat-label">粒子数</span>
                <strong id="particleCount" class="stat-value">0</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">FPS</span>
                <strong id="fpsValue" class="stat-value">0</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">画笔</span>
                <strong id="brushStatus" class="stat-value">4 格</strong>
              </div>
              <div class="stat-card">
                <span class="stat-label">刚体数</span>
                <strong id="bodyCount" class="stat-value">0</strong>
              </div>
            </div>
          </section>

          <section class="panel controls-panel">
            <h2>玩法提示</h2>
            <ul class="help-list">
              <li>沙子会堆积，水会流动，油会更黏且可燃。</li>
              <li>火会点燃木头和油，并逐渐转成烟。</li>
              <li>刚体容器会阻挡材料，球体在水中更容易漂浮，在沙中会下陷减速。</li>
            </ul>
          </section>
        </aside>
      </main>
    </div>

    <script>
      const CELL_SIZE = 4;
      const WORLD_WIDTH = 240;
      const WORLD_HEIGHT = 160;
      const EMPTY = "empty";
      const SOLID_BODY = "solid-body";
      const UI_UPDATE_INTERVAL = 150;

      const MATERIALS = {
        empty: { id: EMPTY, name: "橡皮擦", color: "#05080d", palette: ["#05080d"], state: "tool", density: 0, static: false },
        sand: { id: "sand", name: "沙子", color: "#d6b35d", palette: ["#d6b35d", "#c9a451", "#e4c77f"], noiseTint: 18, density: 6, state: "powder", static: false },
        water: { id: "water", name: "水", color: "#4ea4ff", palette: ["#4ea4ff", "#357fe4", "#69b9ff"], noiseTint: 20, density: 3, state: "liquid", flowChance: 1, spreadChance: 0.95, static: false },
        stone: { id: "stone", name: "石头", color: "#7f8ea3", palette: ["#7f8ea3", "#68788f", "#97a5b5"], noiseTint: 12, density: 9, state: "solid", static: true },
        wood: { id: "wood", name: "木头", color: "#6d4a31", palette: ["#6d4a31", "#8a5a3d", "#593824"], noiseTint: 12, density: 8, state: "solid", static: true, flammable: true, ignitionChance: 0.14 },
        fire: { id: "fire", name: "火焰", color: "#ff8547", palette: ["#ff8547", "#ffb347", "#ff5f3f"], noiseTint: 24, density: 1, state: "fire", static: false, burnTime: [10, 26], spreadChance: 0.34 },
        oil: { id: "oil", name: "油", color: "#b07c3d", palette: ["#b07c3d", "#8d602b", "#d09856"], noiseTint: 16, density: 2.6, state: "liquid", static: false, flammable: true, ignitionChance: 0.32, flowChance: 0.72, spreadChance: 0.58 },
        smoke: { id: "smoke", name: "烟", color: "#95a0b2", palette: ["#95a0b2", "#707b8e", "#b0b8c4"], noiseTint: 10, density: 0.4, state: "gas", static: false, burnTime: [24, 54], spreadChance: 0.7 },
      };

      const state = {
        grid: [],
        occupancy: new Uint8Array(WORLD_WIDTH * WORLD_HEIGHT),
        activeMaterial: "sand",
        brushSize: 4,
        paused: false,
        showGrid: true,
        painting: false,
        erasing: false,
        stepRequested: false,
        rigidEnabled: true,
        draggingBody: false,
        mouse: { x: 0, y: 0, inside: false },
        matter: null,
        bodyOccupancyVersion: 0,
        stats: {
          fps: 0,
          particleCount: 0,
          lastFrameTime: performance.now(),
          lastUiUpdate: 0,
        },
      };

      const canvas = document.querySelector("#worldCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      const palette = document.querySelector("#materialPalette");
      const brushSizeInput = document.querySelector("#brushSize");
      const brushSizeValue = document.querySelector("#brushSizeValue");
      const pauseButton = document.querySelector("#pauseButton");
      const stepButton = document.querySelector("#stepButton");
      const clearButton = document.querySelector("#clearButton");
      const resetButton = document.querySelector("#resetButton");
      const sprinkleButton = document.querySelector("#sprinkleButton");
      const rigidToggleButton = document.querySelector("#rigidToggleButton");
      const spawnBallButton = document.querySelector("#spawnBallButton");
      const rebuildPhysicsButton = document.querySelector("#rebuildPhysicsButton");
      const simulationStatus = document.querySelector("#simulationStatus");
      const rigidStatus = document.querySelector("#rigidStatus");
      const activeMaterialLabel = document.querySelector("#activeMaterialLabel");
      const particleCountValue = document.querySelector("#particleCount");
      const fpsValue = document.querySelector("#fpsValue");
      const brushStatus = document.querySelector("#brushStatus");
      const bodyCountValue = document.querySelector("#bodyCount");
      const showGridInput = document.querySelector("#showGrid");

      canvas.width = WORLD_WIDTH * CELL_SIZE;
      canvas.height = WORLD_HEIGHT * CELL_SIZE;
      ctx.imageSmoothingEnabled = false;

      function randomBetween(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function inBounds(x, y) {
        return x >= 0 && x < WORLD_WIDTH && y >= 0 && y < WORLD_HEIGHT;
      }

      function occupancyIndex(x, y) {
        return y * WORLD_WIDTH + x;
      }

      function createCell(type = EMPTY) {
        if (type === EMPTY) {
          return { type: EMPTY, updated: false, color: MATERIALS.empty.color };
        }

        const material = MATERIALS[type];
        const cell = {
          type,
          updated: false,
          color: material.palette[randomBetween(0, material.palette.length - 1)],
          life: 0,
        };

        if (material.burnTime) {
          cell.life = randomBetween(material.burnTime[0], material.burnTime[1]);
        }

        return cell;
      }

      function createGrid() {
        return Array.from({ length: WORLD_HEIGHT }, () => Array.from({ length: WORLD_WIDTH }, () => createCell()));
      }

      function getCell(x, y) {
        if (!inBounds(x, y)) {
          return null;
        }
        return state.grid[y][x];
      }

      function setCell(x, y, type) {
        if (!inBounds(x, y) || isOccupied(x, y)) {
          return;
        }
        state.grid[y][x] = createCell(type);
      }

      function clearCell(x, y) {
        if (!inBounds(x, y)) {
          return;
        }
        state.grid[y][x] = createCell();
      }

      function isOccupied(x, y) {
        return inBounds(x, y) && state.occupancy[occupancyIndex(x, y)] === 1;
      }

      function isPassableFor(type, x, y) {
        if (!inBounds(x, y) || isOccupied(x, y)) {
          return false;
        }
        const target = getCell(x, y);
        return canDisplace(type, target.type);
      }

      function swapCells(ax, ay, bx, by) {
        const temp = state.grid[ay][ax];
        state.grid[ay][ax] = state.grid[by][bx];
        state.grid[by][bx] = temp;
        state.grid[ay][ax].updated = true;
        state.grid[by][bx].updated = true;
      }

      function resetUpdatedFlags() {
        for (let y = 0; y < WORLD_HEIGHT; y += 1) {
          for (let x = 0; x < WORLD_WIDTH; x += 1) {
            state.grid[y][x].updated = false;
          }
        }
      }

      function canDisplace(movingType, targetType) {
        if (targetType === EMPTY) {
          return true;
        }
        const moving = MATERIALS[movingType];
        const target = MATERIALS[targetType];
        return Boolean(target) && moving.density > target.density;
      }

      function tryMove(x, y, tx, ty) {
        if (!isPassableFor(state.grid[y][x].type, tx, ty)) {
          return false;
        }
        swapCells(x, y, tx, ty);
        return true;
      }

      function forNeighbors(x, y, callback) {
        for (let oy = -1; oy <= 1; oy += 1) {
          for (let ox = -1; ox <= 1; ox += 1) {
            if (ox === 0 && oy === 0) {
              continue;
            }
            const nx = x + ox;
            const ny = y + oy;
            if (inBounds(nx, ny)) {
              callback(nx, ny, state.grid[ny][nx]);
            }
          }
        }
      }

      function igniteAround(x, y) {
        forNeighbors(x, y, (nx, ny, neighbor) => {
          const material = MATERIALS[neighbor.type];
          if (!material?.flammable) {
            return;
          }
          if (Math.random() < material.ignitionChance) {
            state.grid[ny][nx] = createCell("fire");
          }
        });
      }

      function updatePowder(x, y) {
        const directions = Math.random() < 0.5 ? [-1, 1] : [1, -1];
        if (tryMove(x, y, x, y + 1)) {
          return;
        }
        for (const dx of directions) {
          if (tryMove(x, y, x + dx, y + 1)) {
            return;
          }
        }
        state.grid[y][x].updated = true;
      }

      function updateLiquid(x, y, type) {
        const material = MATERIALS[type];
        const directions = Math.random() < 0.5 ? [-1, 1] : [1, -1];
        if (tryMove(x, y, x, y + 1)) {
          return;
        }
        for (const dx of directions) {
          if (tryMove(x, y, x + dx, y + 1)) {
            return;
          }
        }
        const maxSpread = type === "oil" ? 2 : 4;
        for (const dx of directions) {
          for (let step = 1; step <= maxSpread; step += 1) {
            if (Math.random() > (material.flowChance ?? 1)) {
              break;
            }
            if (tryMove(x, y, x + dx * step, y)) {
              return;
            }
            if (getCell(clamp(x + dx * step, 0, WORLD_WIDTH - 1), y)?.type !== EMPTY) {
              break;
            }
          }
        }
        state.grid[y][x].updated = true;
      }

      function updateFire(x, y) {
        const cell = state.grid[y][x];
        cell.life -= 1;
        igniteAround(x, y);

        if (Math.random() < 0.34 && isPassableFor("smoke", x, y - 1)) {
          state.grid[y - 1][x] = createCell("smoke");
        }

        const below = getCell(x, y + 1);
        if (below?.type === "water") {
          clearCell(x, y);
          return;
        }

        if (cell.life <= 0) {
          state.grid[y][x] = Math.random() < 0.7 ? createCell("smoke") : createCell();
          state.grid[y][x].updated = true;
          return;
        }

        const drift = Math.random() < 0.5 ? [-1, 1] : [1, -1];
        for (const dx of drift) {
          if (Math.random() < 0.35 && tryMove(x, y, x + dx, y - 1)) {
            return;
          }
        }
        state.grid[y][x].updated = true;
      }

      function updateSmoke(x, y) {
        const cell = state.grid[y][x];
        cell.life -= 1;
        if (cell.life <= 0 || Math.random() < 0.015) {
          clearCell(x, y);
          return;
        }
        const directions = Math.random() < 0.5 ? [-1, 1] : [1, -1];
        if (tryMove(x, y, x, y - 1)) {
          return;
        }
        for (const dx of directions) {
          if (tryMove(x, y, x + dx, y - 1)) {
            return;
          }
        }
        for (const dx of directions) {
          if (Math.random() < 0.65 && tryMove(x, y, x + dx, y)) {
            return;
          }
        }
        state.grid[y][x].updated = true;
      }

      function updateWorld() {
        resetUpdatedFlags();

        for (let y = 0; y < WORLD_HEIGHT; y += 1) {
          const leftToRight = (y + state.bodyOccupancyVersion) % 2 === 0;
          for (let i = 0; i < WORLD_WIDTH; i += 1) {
            const x = leftToRight ? i : WORLD_WIDTH - 1 - i;
            const cell = state.grid[y][x];
            if (cell.updated || cell.type === EMPTY || MATERIALS[cell.type].state !== "fire" && MATERIALS[cell.type].state !== "gas") {
              continue;
            }
            if (cell.type === "fire") {
              updateFire(x, y);
            } else if (cell.type === "smoke") {
              updateSmoke(x, y);
            }
          }
        }

        for (let y = WORLD_HEIGHT - 1; y >= 0; y -= 1) {
          const leftToRight = (y + state.bodyOccupancyVersion) % 2 === 1;
          for (let i = 0; i < WORLD_WIDTH; i += 1) {
            const x = leftToRight ? i : WORLD_WIDTH - 1 - i;
            const cell = state.grid[y][x];
            if (cell.updated || cell.type === EMPTY) {
              continue;
            }
            const material = MATERIALS[cell.type];
            if (material.state === "liquid") {
              updateLiquid(x, y, cell.type);
            } else if (material.state === "powder") {
              updatePowder(x, y);
            }
          }
        }
      }

      function colorForCell(cell) {
        if (cell.type === EMPTY) {
          return MATERIALS.empty.color;
        }
        if (cell.type === "fire") {
          return cell.life < 8 ? "#ffcf6b" : cell.color;
        }
        return cell.color;
      }

      function drawGridOverlay() {
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for (let x = 0; x <= WORLD_WIDTH; x += 1) {
          ctx.beginPath();
          ctx.moveTo(x * CELL_SIZE + 0.5, 0);
          ctx.lineTo(x * CELL_SIZE + 0.5, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y <= WORLD_HEIGHT; y += 1) {
          ctx.beginPath();
          ctx.moveTo(0, y * CELL_SIZE + 0.5);
          ctx.lineTo(canvas.width, y * CELL_SIZE + 0.5);
          ctx.stroke();
        }
      }

      function renderCells() {
        ctx.fillStyle = MATERIALS.empty.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        let particleCount = 0;
        for (let y = 0; y < WORLD_HEIGHT; y += 1) {
          for (let x = 0; x < WORLD_WIDTH; x += 1) {
            const cell = state.grid[y][x];
            if (cell.type !== EMPTY) {
              particleCount += 1;
            }
            ctx.fillStyle = colorForCell(cell);
            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }
        state.stats.particleCount = particleCount;
        if (state.showGrid) {
          drawGridOverlay();
        }
      }

      function renderBodyOccupancy() {
        if (!state.rigidEnabled) {
          return;
        }
        ctx.fillStyle = "rgba(188, 220, 255, 0.14)";
        for (let y = 0; y < WORLD_HEIGHT; y += 1) {
          for (let x = 0; x < WORLD_WIDTH; x += 1) {
            if (isOccupied(x, y)) {
              ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
          }
        }
      }

      function renderMatter() {
        if (!state.rigidEnabled || !state.matter) {
          return;
        }
        for (const body of state.matter.renderBodies) {
          ctx.save();
          ctx.translate(body.position.x, body.position.y);
          ctx.rotate(body.angle);
          ctx.fillStyle = body.isStatic ? "rgba(209, 223, 255, 0.18)" : "rgba(90, 180, 255, 0.88)";
          ctx.strokeStyle = body.isStatic ? "rgba(235, 241, 255, 0.38)" : "rgba(255, 255, 255, 0.55)";
          ctx.lineWidth = 2;
          if (body.circleRadius) {
            ctx.beginPath();
            ctx.arc(0, 0, body.circleRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(body.vertices[0].x - body.position.x, body.vertices[0].y - body.position.y);
            for (let i = 1; i < body.vertices.length; i += 1) {
              ctx.lineTo(body.vertices[i].x - body.position.x, body.vertices[i].y - body.position.y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function renderBrushPreview() {
        if (!state.mouse.inside) {
          return;
        }
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(
          state.mouse.x * CELL_SIZE + CELL_SIZE / 2,
          state.mouse.y * CELL_SIZE + CELL_SIZE / 2,
          state.brushSize * CELL_SIZE,
          0,
          Math.PI * 2
        );
        ctx.stroke();
        ctx.restore();
      }

      function render() {
        renderCells();
        renderBodyOccupancy();
        renderMatter();
        renderBrushPreview();
      }

      function applyBrush(gridX, gridY, material = state.activeMaterial) {
        const radius = state.brushSize;
        for (let y = gridY - radius; y <= gridY + radius; y += 1) {
          for (let x = gridX - radius; x <= gridX + radius; x += 1) {
            if (!inBounds(x, y)) {
              continue;
            }
            if (Math.hypot(x - gridX, y - gridY) > radius) {
              continue;
            }
            if (material === EMPTY) {
              clearCell(x, y);
            } else if (!isOccupied(x, y)) {
              state.grid[y][x] = createCell(material);
            }
          }
        }
      }

      function screenToGrid(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = clamp(Math.floor(((event.clientX - rect.left) * scaleX) / CELL_SIZE), 0, WORLD_WIDTH - 1);
        const y = clamp(Math.floor(((event.clientY - rect.top) * scaleY) / CELL_SIZE), 0, WORLD_HEIGHT - 1);
        return { x, y };
      }

      function updateMousePosition(event) {
        const position = screenToGrid(event);
        state.mouse.x = position.x;
        state.mouse.y = position.y;
        state.mouse.inside = true;
        if (state.painting && !state.draggingBody) {
          applyBrush(position.x, position.y, state.erasing ? EMPTY : state.activeMaterial);
        }
      }

      function setActiveMaterial(materialKey) {
        state.activeMaterial = materialKey;
        activeMaterialLabel.textContent = `当前材质：${MATERIALS[materialKey].name}`;
        for (const button of palette.querySelectorAll("button")) {
          button.classList.toggle("active", button.dataset.material === materialKey);
        }
      }

      function updateStatus(now = performance.now()) {
        simulationStatus.textContent = state.paused ? "已暂停" : "运行中";
        rigidStatus.textContent = state.rigidEnabled ? "刚体层开启" : "刚体层关闭";
        rigidStatus.classList.toggle("pill-muted", !state.rigidEnabled);
        pauseButton.textContent = state.paused ? "继续" : "暂停";
        rigidToggleButton.textContent = state.rigidEnabled ? "关闭刚体层" : "开启刚体层";
        brushSizeValue.textContent = String(state.brushSize);
        brushStatus.textContent = `${state.brushSize} 格`;
        bodyCountValue.textContent = String(state.matter?.dynamicBodies.length ?? 0);
        if (now - state.stats.lastUiUpdate >= UI_UPDATE_INTERVAL) {
          particleCountValue.textContent = state.stats.particleCount.toLocaleString("zh-CN");
          fpsValue.textContent = String(Math.round(state.stats.fps));
          state.stats.lastUiUpdate = now;
        }
      }

      function clearOccupancy() {
        state.occupancy.fill(0);
      }

      function pointInBody(body, px, py) {
        return Matter.Vertices.contains(body.vertices, { x: px, y: py });
      }

      function mapBodiesToGrid() {
        clearOccupancy();
        if (!state.rigidEnabled || !state.matter) {
          return;
        }
        state.bodyOccupancyVersion += 1;
        for (const body of state.matter.obstacleBodies) {
          const minX = clamp(Math.floor(body.bounds.min.x / CELL_SIZE), 0, WORLD_WIDTH - 1);
          const maxX = clamp(Math.ceil(body.bounds.max.x / CELL_SIZE), 0, WORLD_WIDTH - 1);
          const minY = clamp(Math.floor(body.bounds.min.y / CELL_SIZE), 0, WORLD_HEIGHT - 1);
          const maxY = clamp(Math.ceil(body.bounds.max.y / CELL_SIZE), 0, WORLD_HEIGHT - 1);
          for (let y = minY; y <= maxY; y += 1) {
            for (let x = minX; x <= maxX; x += 1) {
              const centerX = x * CELL_SIZE + CELL_SIZE * 0.5;
              const centerY = y * CELL_SIZE + CELL_SIZE * 0.5;
              if (pointInBody(body, centerX, centerY)) {
                state.occupancy[occupancyIndex(x, y)] = 1;
                if (state.grid[y][x].type !== EMPTY && !body.isStatic) {
                  clearCell(x, y);
                }
              }
            }
          }
        }
      }

      function sampleMediumAroundBody(body) {
        const samples = { water: 0, sand: 0, oil: 0, occupied: 0 };
        const radius = body.circleRadius ? body.circleRadius : Math.max(body.bounds.max.x - body.bounds.min.x, body.bounds.max.y - body.bounds.min.y) * 0.35;
        const minX = clamp(Math.floor((body.position.x - radius) / CELL_SIZE), 0, WORLD_WIDTH - 1);
        const maxX = clamp(Math.ceil((body.position.x + radius) / CELL_SIZE), 0, WORLD_WIDTH - 1);
        const minY = clamp(Math.floor((body.position.y - radius) / CELL_SIZE), 0, WORLD_HEIGHT - 1);
        const maxY = clamp(Math.ceil((body.position.y + radius) / CELL_SIZE), 0, WORLD_HEIGHT - 1);
        for (let y = minY; y <= maxY; y += 1) {
          for (let x = minX; x <= maxX; x += 1) {
            const cell = getCell(x, y);
            if (!cell || cell.type === EMPTY) {
              continue;
            }
            if (cell.type === "water") {
              samples.water += 1;
            } else if (cell.type === "sand") {
              samples.sand += 1;
            } else if (cell.type === "oil") {
              samples.oil += 1;
            }
            samples.occupied += 1;
          }
        }
        return samples;
      }

      function applyMediumForces() {
        if (!state.rigidEnabled || !state.matter) {
          return;
        }
        const { Body } = Matter;
        for (const body of state.matter.dynamicBodies) {
          const samples = sampleMediumAroundBody(body);
          if (!samples.occupied) {
            Body.setAngularVelocity(body, body.angularVelocity * 0.995);
            continue;
          }
          const buoyancy = samples.water * 0.000035 + samples.oil * 0.00002;
          const dragScale = clamp(1 - samples.sand * 0.007 - samples.water * 0.0015 - samples.oil * 0.0025, 0.76, 0.999);
          if (buoyancy > 0) {
            Body.applyForce(body, body.position, { x: 0, y: -buoyancy * body.mass });
          }
          if (samples.sand > 0 || samples.water > 0 || samples.oil > 0) {
            Body.setVelocity(body, { x: body.velocity.x * dragScale, y: body.velocity.y * dragScale });
            Body.setAngularVelocity(body, body.angularVelocity * clamp(dragScale + 0.02, 0.78, 0.999));
          }
        }
      }

      function createBounds(Bodies) {
        const thickness = 40;
        return [
          Bodies.rectangle(canvas.width / 2, canvas.height + thickness / 2, canvas.width + thickness * 2, thickness, { isStatic: true, label: SOLID_BODY }),
          Bodies.rectangle(-thickness / 2, canvas.height / 2, thickness, canvas.height, { isStatic: true, label: SOLID_BODY }),
          Bodies.rectangle(canvas.width + thickness / 2, canvas.height / 2, thickness, canvas.height, { isStatic: true, label: SOLID_BODY }),
        ];
      }

      function createDefaultBodies(Bodies) {
        const leftSlope = Bodies.rectangle(canvas.width * 0.25, canvas.height * 0.74, 200, 18, { isStatic: true, angle: 0.26, label: SOLID_BODY });
        const rightSlope = Bodies.rectangle(canvas.width * 0.72, canvas.height * 0.7, 220, 18, { isStatic: true, angle: -0.38, label: SOLID_BODY });
        const cupLeft = Bodies.rectangle(canvas.width * 0.56, canvas.height * 0.76, 18, 150, { isStatic: true, angle: 0.02, label: SOLID_BODY });
        const cupRight = Bodies.rectangle(canvas.width * 0.68, canvas.height * 0.76, 18, 150, { isStatic: true, angle: -0.02, label: SOLID_BODY });
        const cupBase = Bodies.rectangle(canvas.width * 0.62, canvas.height * 0.86, 150, 18, { isStatic: true, angle: 0.01, label: SOLID_BODY });
        const ballA = Bodies.circle(canvas.width * 0.18, 100, 26, { restitution: 0.52, frictionAir: 0.006, label: "dynamic-ball" });
        const ballB = Bodies.circle(canvas.width * 0.38, 40, 22, { restitution: 0.72, frictionAir: 0.004, label: "dynamic-ball" });
        const box = Bodies.rectangle(canvas.width * 0.78, 70, 46, 46, { restitution: 0.24, frictionAir: 0.01, label: "dynamic-box" });
        return { obstacles: [leftSlope, rightSlope, cupLeft, cupRight, cupBase], dynamics: [ballA, ballB, box] };
      }

      function teardownMatterWorld() {
        if (!state.matter) {
          return;
        }
        const { Render, Runner, World, Engine, Mouse, MouseConstraint } = state.matter;
        if (state.matter.mouseConstraint) {
          World.remove(state.matter.engine.world, state.matter.mouseConstraint);
        }
        Mouse.clearSourceEvents(state.matter.mouse);
        Runner.stop(state.matter.runner);
        Render.stop(state.matter.render);
        state.matter.render.canvas.remove();
        state.matter.render.textures = {};
        Engine.clear(state.matter.engine);
        state.matter = null;
      }

      function setupMatterWorld() {
        if (!window.Matter) {
          state.rigidEnabled = false;
          rigidToggleButton.disabled = true;
          rebuildPhysicsButton.disabled = true;
          spawnBallButton.disabled = true;
          return;
        }

        teardownMatterWorld();

        const { Engine, Render, Runner, World, Bodies, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create();
        engine.gravity.y = 0.82;

        const hiddenCanvas = document.createElement("canvas");
        const render = Render.create({
          canvas: hiddenCanvas,
          engine,
          options: { width: canvas.width, height: canvas.height, wireframes: false, background: "transparent" },
        });
        const runner = Runner.create();

        const bounds = createBounds(Bodies);
        const defaults = createDefaultBodies(Bodies);
        const renderBodies = [...defaults.obstacles, ...defaults.dynamics];
        const obstacleBodies = [...bounds, ...defaults.obstacles, ...defaults.dynamics];
        const worldBodies = [...bounds, ...renderBodies];

        const mouse = Mouse.create(canvas);
        mouse.pixelRatio = canvas.width / canvas.getBoundingClientRect().width;
        const mouseConstraint = MouseConstraint.create(engine, {
          mouse,
          constraint: {
            angularStiffness: 0,
            stiffness: 0.18,
            render: { visible: false },
          },
        });

        Matter.Events.on(mouseConstraint, "startdrag", () => {
          state.draggingBody = true;
        });
        Matter.Events.on(mouseConstraint, "enddrag", () => {
          state.draggingBody = false;
        });

        World.add(engine.world, [...worldBodies, mouseConstraint]);
        Render.run(render);
        Runner.run(runner, engine);

        state.matter = {
          Engine,
          World,
          Bodies,
          Render,
          Runner,
          Mouse,
          MouseConstraint,
          engine,
          render,
          runner,
          mouse,
          mouseConstraint,
          renderBodies,
          obstacleBodies,
          dynamicBodies: defaults.dynamics,
        };
      }

      function addBall() {
        if (!state.matter) {
          return;
        }
        const ball = state.matter.Bodies.circle(randomBetween(90, canvas.width - 90), 40, randomBetween(16, 28), {
          restitution: 0.68,
          frictionAir: 0.005,
          label: "dynamic-ball",
        });
        state.matter.World.add(state.matter.engine.world, ball);
        state.matter.dynamicBodies.push(ball);
        state.matter.renderBodies.push(ball);
        state.matter.obstacleBodies.push(ball);
      }

      function updateMatter() {
        if (!state.rigidEnabled || !state.matter) {
          clearOccupancy();
          return;
        }
        mapBodiesToGrid();
        applyMediumForces();
      }

      function sprinkleScene() {
        const materials = ["sand", "water", "wood", "stone", "oil"];
        for (let i = 0; i < 1100; i += 1) {
          const x = randomBetween(8, WORLD_WIDTH - 9);
          const y = randomBetween(4, Math.floor(WORLD_HEIGHT * 0.56));
          const type = materials[randomBetween(0, materials.length - 1)];
          if (!isOccupied(x, y)) {
            state.grid[y][x] = createCell(type);
          }
        }
        for (let i = 0; i < 12; i += 1) {
          const x = randomBetween(20, WORLD_WIDTH - 20);
          const y = randomBetween(8, 30);
          if (!isOccupied(x, y)) {
            state.grid[y][x] = createCell("fire");
          }
        }
      }

      function buildDemoTerrain() {
        state.grid = createGrid();

        for (let x = 0; x < WORLD_WIDTH; x += 1) {
          state.grid[WORLD_HEIGHT - 3][x] = createCell("stone");
          state.grid[WORLD_HEIGHT - 2][x] = createCell("stone");
          state.grid[WORLD_HEIGHT - 1][x] = createCell("stone");
        }

        for (let y = WORLD_HEIGHT - 36; y < WORLD_HEIGHT - 3; y += 1) {
          state.grid[y][14] = createCell("stone");
          state.grid[y][WORLD_WIDTH - 15] = createCell("stone");
        }

        for (let x = 22; x < 86; x += 1) {
          state.grid[28][x] = createCell("sand");
          state.grid[29][x] = createCell("sand");
        }

        for (let x = 110; x < 170; x += 1) {
          state.grid[18][x] = createCell("water");
          state.grid[19][x] = createCell("water");
          state.grid[20][x] = createCell("oil");
        }

        for (let x = 46; x < 92; x += 1) {
          state.grid[96][x] = createCell("wood");
        }

        for (let y = 78; y < 106; y += 1) {
          state.grid[y][42] = createCell("wood");
          state.grid[y][94] = createCell("wood");
        }

        for (let x = 182; x < 218; x += 1) {
          state.grid[66][x] = createCell("stone");
        }

        state.grid[95][56] = createCell("fire");
        state.grid[95][82] = createCell("fire");
        state.grid[26][148] = createCell("smoke");
      }

      function bindControls() {
        Object.entries(MATERIALS).forEach(([key, material]) => {
          if (material.state === "tool" || key === EMPTY) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "material-button";
            button.dataset.material = key;
            button.innerHTML = `<span class="material-swatch" style="background:${material.color}"></span><span>${material.name}</span>`;
            button.addEventListener("click", () => setActiveMaterial(key));
            palette.appendChild(button);
            return;
          }
          const button = document.createElement("button");
          button.type = "button";
          button.className = "material-button";
          button.dataset.material = key;
          button.innerHTML = `<span class="material-swatch" style="background:linear-gradient(135deg, ${material.palette.join(",")})"></span><span>${material.name}</span>`;
          button.addEventListener("click", () => setActiveMaterial(key));
          palette.appendChild(button);
        });

        setActiveMaterial(state.activeMaterial);
        brushStatus.textContent = `${state.brushSize} 格`;

        brushSizeInput.addEventListener("input", (event) => {
          state.brushSize = Number(event.target.value);
          brushSizeValue.textContent = String(state.brushSize);
          brushStatus.textContent = `${state.brushSize} 格`;
        });

        pauseButton.addEventListener("click", () => {
          state.paused = !state.paused;
          updateStatus();
        });

        stepButton.addEventListener("click", () => {
          state.stepRequested = true;
        });

        clearButton.addEventListener("click", () => {
          state.grid = createGrid();
        });

        resetButton.addEventListener("click", () => {
          buildDemoTerrain();
        });

        sprinkleButton.addEventListener("click", sprinkleScene);
        spawnBallButton.addEventListener("click", addBall);
        rebuildPhysicsButton.addEventListener("click", setupMatterWorld);

        rigidToggleButton.addEventListener("click", () => {
          state.rigidEnabled = !state.rigidEnabled;
          state.draggingBody = false;
          updateStatus();
        });

        showGridInput.addEventListener("change", (event) => {
          state.showGrid = event.target.checked;
        });

        canvas.addEventListener("contextmenu", (event) => event.preventDefault());
        canvas.addEventListener("wheel", (event) => {
          event.preventDefault();
          const delta = Math.sign(event.deltaY);
          state.brushSize = clamp(state.brushSize - delta, 1, 14);
          brushSizeInput.value = String(state.brushSize);
          brushSizeValue.textContent = String(state.brushSize);
          brushStatus.textContent = `${state.brushSize} 格`;
        }, { passive: false });

        canvas.addEventListener("pointerdown", (event) => {
          const { x, y } = screenToGrid(event);
          state.painting = true;
          state.erasing = event.button === 2 || state.activeMaterial === EMPTY;
          updateMousePosition(event);
          if (!state.draggingBody) {
            applyBrush(x, y, state.erasing ? EMPTY : state.activeMaterial);
          }
        });

        canvas.addEventListener("pointermove", updateMousePosition);
        canvas.addEventListener("pointerleave", () => {
          state.mouse.inside = false;
        });
        window.addEventListener("pointerup", () => {
          state.painting = false;
          state.erasing = false;
        });
      }

      function tick(now) {
        const delta = now - state.stats.lastFrameTime;
        state.stats.lastFrameTime = now;
        state.stats.fps = delta > 0 ? 1000 / delta : 0;

        const shouldAdvance = !state.paused || state.stepRequested;
        if (shouldAdvance) {
          updateMatter();
          updateWorld();
          state.stepRequested = false;
        } else {
          updateMatter();
        }

        render();
        updateStatus(now);
        requestAnimationFrame(tick);
      }

      function init() {
        buildDemoTerrain();
        bindControls();
        setupMatterWorld();
        updateMatter();
        updateStatus();
        requestAnimationFrame(tick);
      }

      init();
    </script>
  </body>
</html>
